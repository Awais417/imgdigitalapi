[build]
  command = "npm install && npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["@nestjs/microservices", "@nestjs/websockets", "class-transformer", "class-validator"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
